header-includes: |
  ```{=typst}
  #set text(ligatures: true, discretionary-ligatures: false, number-type: "old-style")
  #set par(leading: 0.65em, justify: true)
  #show figure.caption: it => [
    #set text(font: "Helvetica", size: 10pt, discretionary-ligatures: false, number-type: "lining")
    #emph[#it.supplement~#context(it.counter.display(it.numbering)) — #it.body]
  ]
  #set list(spacing: 1.2em)
  //#show heading.where(level:1): it=> [#pagebreak() #it]
  ```
