#template: "template.typst"   # points to your conf module (must be reachable by Pandoc)
font:
  - "Helvetica"
  - "DejaVu Sans"
  - "TeX Gyre Pagella Math"
mainfont: "Helvetica"   # optional, kept for compatibility
mathfont: "STIX Two Math"
fontsize: 11pt
monofont: "Consolas"
papersize: a4
margin: {x: 2cm, y: 2.5cm}
columns: 1
lang: "en-GB"
toc-title: "Table of Contents"
doindex: false

header-includes: |
  ```{=typst}
  #set text(ligatures: true, discretionary-ligatures: false, number-type: "old-style")
  #set par(leading: 0.65em, justify: true)
  #show figure.caption: it => [
    #set text(size: 10pt, discretionary-ligatures: false, number-type: "lining")
    #emph[#it.supplement~#context(it.counter.display(it.numbering)) — #it.body]
  ]
  #set list(spacing: 1.2em)
  ```
  